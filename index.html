<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 1. 모바일 최적화를 위한 핵심 뷰포트 메타 태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinjeon Canada | Coming Soon</title>
    
    <style>
        /* 기본 반응형 스타일 (모바일 우선) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            
            /* 2. 콘솔 오류 해결: 영어 이름의 이미지 파일을 사용하도록 설정 */
            /* 중요: 사용자님은 저장소에 /images 폴더를 만들고, */
            /* 그 안에 영어 이름의 이미지 파일(예: background-main.jpg)을 넣어야 합니다. */
            background-image: url('images/background-main.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            color: #333;
            background-color: #f9f9f9; /* 배경 이미지 로딩 전 기본 색상 */
        }

        /* 메인 컨테이너 */
        .main-container {
            max-width: 340px; /* 초기 모바일 컨테이너 폭 */
            width: 90%; /* 뷰포트 폭에 맞춰 조절 */
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        /* 로고 (반응형) */
        .logo {
            max-width: 140px; /* 모바일 로고 크기 */
            height: auto;
            margin-bottom: 25px;
        }

        /* 텍스트 크기 최적화 (rem 사용) */
        h1 {
            font-size: 1.6rem;
            margin: 0 0 15px;
            color: #2c3e50;
        }

        p {
            font-size: 1rem;
            margin: 0 0 25px;
            line-height: 1.6;
            color: #7f8c8d;
        }

        /* 터치 최적화 버튼 */
        .contact-button {
            display: inline-block;
            padding: 15px 35px;
            background-color: #e74c3c; /* Sinjeon 브랜드 컬러 예시 */
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.2s, transform 0.1s;
            /* 터치 타겟 크기 최적화 */
            min-height: 48px;
            cursor: pointer;
        }

        .contact-button:hover {
            background-color: #c0392b;
        }

        .contact-button:active {
            transform: scale(0.98);
        }

        /* 푸터 메시지 */
        .footer-message {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #bdc3c7;
        }

        /* 데스크톱 최적화 (태블릿 이상, min-width: 768px) */
        @media (min-width: 768px) {
            .main-container {
                max-width: 600px; /* 데스크톱 컨테이너 폭 */
                padding: 50px;
            }
            
            .logo {
                max-width: 180px; /* 데스크톱 로고 크기 */
            }

            h1 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 
            3. 콘솔 오류 해결:
            사용자님, 스크린샷(`image_2.png`)의 404 오류를 해결하기 위해
            저장소의 한글 이미지 파일 이름을 영어 소문자 및 하이픈으로 변경해 주세요.
            예: "신전로고_logo_1.png" -> "sinjeon-logo.png"
            그리고 'images' 폴더를 만들어 그 안에 넣어주세요.
        -->
        
        <!-- 로고 이미지 (반응형) -->
        <img src="images/sinjeon-logo.png" alt="Sinjeon Canada Logo" class="logo">
        
        <h1>곧 만나요, Sinjeon Canada!</h1>
        <p>캐나다에 계신 모든 분들께 진짜 신전 떡볶이의 맛을 전해드리기 위해 열심히 준비 중입니다. 웹사이트 오픈을 기대해 주세요!</p>
        
        <!-- 연락처 버튼 -->
        <a href="mailto:contact@sinjeoncanada.com" class="contact-button">Contact Us</a>
        
        <p class="footer-message">&copy; 2024 Sinjeon Canada. All rights reserved.</p>
    </div>
</body>
</html>
